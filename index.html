<!DOCTYPE html>

<html>

<head>

<title>Environment Impact Analyzer</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{

width:500px;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;

}

input{

padding:10px;
width:250px;

}

button{

padding:10px 20px;
background:green;
color:white;
border:none;
cursor:pointer;

}

#result{

margin-top:20px;
text-align:left;

}

</style>

</head>

<body>

<div class="container">

<h2>Environment Impact Analyzer</h2>

<input type="text" id="city" placeholder="Enter City">

<button onclick="searchWeather()">

Search

</button>

<div id="result"></div>

</div>

<script>

function searchWeather(){

let city=document.getElementById("city").value;

fetch("/weather?city="+city)

.then(response=>response.json())

.then(data=>{

document.getElementById("result").innerHTML=`

<h3>${data.city}</h3>

<p><b>Temperature :</b> ${data.temperature} °C</p>

<p><b>Humidity :</b> ${data.humidity}%</p>

<p><b>Pressure :</b> ${data.pressure} hPa</p>

<p><b>Weather :</b> ${data.weather}</p>

<p><b>Wind Speed :</b> ${data.wind} m/s</p>

<p><b>AQI :</b> ${data.aqi}</p>

`;

})

.catch(error=>{

document.getElementById("result").innerHTML="<h3>City Not Found</h3>";

});

}

</script>

</body>

</html>
